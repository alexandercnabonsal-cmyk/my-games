<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #fff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.5em;
      font-weight: bold;
    }

    #status .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
    }

    #board-wrapper {
      background: #1565c0;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 72px);
      grid-template-rows: repeat(6, 72px);
      gap: 8px;
    }

    .cell {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1a1a2e;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
    }

    .cell:hover {
      transform: scale(1.05);
    }

    .cell.red {
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
      cursor: default;
    }

    .cell.yellow {
      background: radial-gradient(circle at 35% 35%, #ffe066, #f39c12);
      cursor: default;
    }

    .cell.win {
      box-shadow: 0 0 16px 4px #fff, inset 0 4px 8px rgba(0,0,0,0.2);
      animation: pulse 0.6s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    .col-hover .cell:not(.red):not(.yellow) {
      background: #2a2a4e;
    }

    #controls {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #restart-btn {
      background: #1565c0;
      color: #fff;
    }

    #players {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border-radius: 10px;
      background: #16213e;
      border: 2px solid transparent;
      transition: border 0.2s;
    }

    .player-card.active {
      border-color: #fff;
    }

    .player-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
    }

    .player-dot.red  { background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); }
    .player-dot.yellow { background: radial-gradient(circle at 35% 35%, #ffe066, #f39c12); }

    .player-name { font-weight: bold; font-size: 1rem; }
  </style>
</head>
<body>

<h1>Connect 4</h1>

<div id="players">
  <div class="player-card active" id="card-red">
    <div class="player-dot red"></div>
    <span class="player-name">Player 1</span>
  </div>
  <div class="player-card" id="card-yellow">
    <div class="player-dot yellow"></div>
    <span class="player-name">Player 2</span>
  </div>
</div>

<div id="status"></div>

<div id="board-wrapper">
  <div id="board"></div>
</div>

<div id="controls">
  <button id="restart-btn">Restart</button>
</div>

<script>
  const ROWS = 6, COLS = 7;
  const EMPTY = 0, RED = 1, YELLOW = 2;

  let board, currentPlayer, gameOver;

  function init() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
    currentPlayer = RED;
    gameOver = false;
    renderBoard();
    updateStatus();
    updateCards();
  }

  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (board[r][c] === RED)    cell.classList.add('red');
        if (board[r][c] === YELLOW) cell.classList.add('yellow');
        cell.dataset.col = c;
        cell.dataset.row = r;
        boardEl.appendChild(cell);
      }
    }

    // Column hover effect
    boardEl.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('mouseenter', () => {
        if (gameOver) return;
        const col = +cell.dataset.col;
        boardEl.querySelectorAll(`.cell[data-col="${col}"]`).forEach(c => c.parentElement.classList);
        highlightCol(col);
      });
    });

    boardEl.addEventListener('click', e => {
      if (gameOver) return;
      const cell = e.target.closest('.cell');
      if (!cell) return;
      dropPiece(+cell.dataset.col);
    });
  }

  function highlightCol(col) {
    document.querySelectorAll('.cell').forEach(c => {
      c.style.background = '';
    });
    document.querySelectorAll(`.cell[data-col="${col}"]`).forEach(c => {
      if (!c.classList.contains('red') && !c.classList.contains('yellow')) {
        c.style.background = '#2a2a4e';
      }
    });
  }

  document.getElementById('board').addEventListener('mouseleave', () => {
    document.querySelectorAll('.cell').forEach(c => { c.style.background = ''; });
  });

  function dropPiece(col) {
    // Find lowest empty row in column
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][col] === EMPTY) { row = r; break; }
    }
    if (row === -1) return; // column full

    board[row][col] = currentPlayer;

    const winner = checkWin(row, col);
    renderBoard();

    if (winner) {
      gameOver = true;
      highlightWin(winner);
      const name = currentPlayer === RED ? 'Player 1 (Red)' : 'Player 2 (Yellow)';
      setStatus(`${name} wins!`, currentPlayer);
      return;
    }

    if (board[0].every(cell => cell !== EMPTY)) {
      gameOver = true;
      setStatus("It's a draw!", 0);
      return;
    }

    currentPlayer = currentPlayer === RED ? YELLOW : RED;
    updateStatus();
    updateCards();
  }

  function checkWin(row, col) {
    const player = board[row][col];
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];

    for (const [dr, dc] of dirs) {
      const cells = [[row, col]];
      for (let sign of [-1, 1]) {
        let r = row + dr*sign, c = col + dc*sign;
        while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
          cells.push([r, c]);
          r += dr*sign; c += dc*sign;
        }
      }
      if (cells.length >= 4) return cells;
    }
    return null;
  }

  function highlightWin(cells) {
    cells.forEach(([r, c]) => {
      const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
      if (cell) cell.classList.add('win');
    });
  }

  function setStatus(msg, player) {
    const statusEl = document.getElementById('status');
    if (player === RED) {
      statusEl.innerHTML = `<span class="dot" style="background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b)"></span>${msg}`;
    } else if (player === YELLOW) {
      statusEl.innerHTML = `<span class="dot" style="background:radial-gradient(circle at 35% 35%,#ffe066,#f39c12)"></span>${msg}`;
    } else {
      statusEl.textContent = msg;
    }
  }

  function updateStatus() {
    const name = currentPlayer === RED ? 'Player 1 (Red)' : 'Player 2 (Yellow)';
    setStatus(`${name}'s turn`, currentPlayer);
  }

  function updateCards() {
    document.getElementById('card-red').classList.toggle('active', currentPlayer === RED);
    document.getElementById('card-yellow').classList.toggle('active', currentPlayer === YELLOW);
  }

  document.getElementById('restart-btn').addEventListener('click', init);

  init();
</script>
</body>
</html>
