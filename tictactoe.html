<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hot Wheels Tic Tac Toe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Russo One', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      color: #ff6600;
      text-shadow: 0 0 20px #ff6600, 0 2px 0 #000;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 4px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    /* Player cards */
    #players {
      display: flex;
      gap: 20px;
      margin-bottom: 18px;
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 2px solid #333;
      transition: border 0.2s, box-shadow 0.2s;
      font-size: 1rem;
    }

    .player-card.active {
      border-color: #ff6600;
      box-shadow: 0 0 14px #ff6600aa;
    }

    .car-icon { display: flex; align-items: center; }
    .car-icon img { width: 90px; height: auto; object-fit: contain; }

    /* Status */
    #status {
      font-size: 1.1rem;
      color: #ffcc00;
      margin-bottom: 20px;
      height: 1.5em;
      text-shadow: 0 0 8px #ffcc00;
      letter-spacing: 1px;
    }

    /* Board */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
      background: #ff6600;
      border-radius: 10px;
      padding: 6px;
      box-shadow: 0 0 30px #ff660066, 0 8px 32px rgba(0,0,0,0.6);
    }

    .cell {
      width: 120px;
      height: 120px;
      background: #111;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell img {
      width: 96px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }

    .cell:hover:not(.taken) {
      background: #1e1e1e;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.win {
      background: #ff6600;
      animation: rev 0.5s infinite alternate;
    }

    @keyframes rev {
      from { transform: scale(1); box-shadow: none; }
      to   { transform: scale(1.06); box-shadow: 0 0 20px #ffcc00; }
    }

    /* Controls */
    #controls {
      margin-top: 24px;
    }

    button {
      padding: 11px 36px;
      font-size: 1rem;
      font-family: 'Russo One', sans-serif;
      border: none;
      border-radius: 8px;
      background: #ff6600;
      color: #fff;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 16px #ff660066;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button:hover { opacity: 0.85; transform: scale(1.04); }

    button img { width: 44px; height: auto; }

    /* Score */
    #score {
      display: flex;
      gap: 32px;
      margin-top: 18px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 1px;
      align-items: center;
    }

    #score .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #score .score-item img { width: 56px; height: auto; }

    #score span { color: #ff6600; font-size: 1.1rem; }
  </style>
</head>
<body>

<h1>HOT WHEELS</h1>
<div class="subtitle">Tic Tac Toe</div>

<div id="players">
  <div class="player-card active" id="card-1">
    <span class="car-icon" id="icon-p1"></span>
    <span>Player 1</span>
  </div>
  <div class="player-card" id="card-2">
    <span class="car-icon" id="icon-p2"></span>
    <span>Player 2</span>
  </div>
</div>

<div id="status">Player 1's turn — FLOOR IT!</div>

<div id="board"></div>

<div id="controls">
  <button id="restart-btn">
    <img src="porsche-993.png" style="width:44px;height:auto;">
    New Race
  </button>
</div>

<div id="score">
  <div class="score-item" id="score-p1-label"></div>
  <div class="score-item" id="score-p2-label"></div>
  <div class="score-item">Draws: <span id="sd">0</span></div>
</div>

<script>
  // Player 1 = Porsche 993 (red Hot Wheels), Player 2 = McLaren F1 (orange)
  function carImg(src, flip, size) {
    const w = size || 90;
    const style = flip ? `width:${w}px;transform:scaleX(-1)` : `width:${w}px`;
    return `<img src="${src}" style="${style}" alt="">`;
  }

  const PORSCHE_SRC = 'porsche-993.png';
  const MCLAREN_SRC = 'mclaren-f1.png';

  // Populate player card icons
  document.getElementById('icon-p1').innerHTML = carImg(PORSCHE_SRC, false, 90);
  document.getElementById('icon-p2').innerHTML = carImg(MCLAREN_SRC, true, 90);

  // Populate score labels
  document.getElementById('score-p1-label').innerHTML = carImg(PORSCHE_SRC, false, 56) + ' P1: <span id="s1">0</span>';
  document.getElementById('score-p2-label').innerHTML = carImg(MCLAREN_SRC, true, 56) + ' P2: <span id="s2">0</span>';

  const CAR_HTML = ['', carImg(PORSCHE_SRC, false, 96), carImg(MCLAREN_SRC, true, 96)];
  const MSGS_TURN = ['', "Player 1's turn — FLOOR IT!", "Player 2's turn — PUNCH IT!"];
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, score = [0,0,0];

  function init() {
    board = Array(9).fill(0);
    current = 1;
    over = false;
    renderBoard();
    setStatus(MSGS_TURN[1]);
    updateCards();
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' taken' : '');
      if (val) cell.innerHTML = CAR_HTML[val];
      cell.addEventListener('click', () => move(i));
      el.appendChild(cell);
    });
  }

  function move(i) {
    if (over || board[i]) return;
    board[i] = current;
    renderBoard();

    const win = getWin();
    if (win) {
      over = true;
      win.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('win'));
      const name = current === 1 ? 'Player 1' : 'Player 2';
      setStatus(`${name} WINS! CHECKERED FLAG!`);
      score[current - 1]++;
      updateScore();
      return;
    }

    if (board.every(v => v)) {
      over = true;
      setStatus("DEAD HEAT! It's a draw!");
      score[2]++;
      updateScore();
      return;
    }

    current = current === 1 ? 2 : 1;
    setStatus(MSGS_TURN[current]);
    updateCards();
  }

  function getWin() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) return [a,b,c];
    }
    return null;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function updateCards() {
    document.getElementById('card-1').classList.toggle('active', current === 1);
    document.getElementById('card-2').classList.toggle('active', current === 2);
  }

  function updateScore() {
    document.getElementById('s1').textContent = score[0];
    document.getElementById('s2').textContent = score[1];
    document.getElementById('sd').textContent = score[2];
  }

  document.getElementById('restart-btn').addEventListener('click', init);

  init();
</script>
</body>
</html>
